<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>勇者大冒險</title>
    <style>
        body { margin: 0; background: #0c0c14; display: flex; justify-content: center; align-items: center; min-height: 100vh; perspective: 1000px; }
        .game-viewport { 
            width: 450px; height: 600px; background: #000; border: 4px solid #4ade80; 
            transform: rotateX(10deg); /* 這就是 3D 傾斜的秘密 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative;
        }
        .monster-area { height: 250px; display: flex; justify-content: center; align-items: center; }
        .narrator { position: absolute; bottom: 50px; width: 100%; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; }
        .avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid #fff; }
        .speech { background: #fff; color: #000; padding: 10px; margin-left: 10px; border-radius: 10px; font-weight: bold; flex-grow: 1; }
    </style>
</head>
<body>
    <div class="game-viewport">
        <div class="monster-area"><img src="https://i.imgur.com/G5y1tPZ.png" style="height: 120px;"></div>
        <div class="narrator">
            <img src="妳的照片連結" class="avatar">
            <div class="speech">準備好挑戰地下城了嗎？</div>
        </div>
    </div>
</body>
</html>
