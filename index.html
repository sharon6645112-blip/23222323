<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勇者大冒險：打怪考驗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d16;
            color: #ffffff;
            font-family: "微軟正黑體", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        body.wrong-flash {
            animation: flash-red 0.15s ease;
        }
        @keyframes flash-red {
            0% { background-color: #0d0d16; }
            50% { background-color: #8b0000; }
            100% { background-color: #0d0d16; }
        }

        .game-container {
            background-color: #161622;
            border: 4px solid #4ade80; 
            border-radius: 16px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.2);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #4ade80;
        }

        .hp-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
        }

        .hp-bar-bg {
            background-color: #222;
            border: 2px solid #fff;
            border-radius: 5px;
            height: 20px;
            width: 60%;
            overflow: hidden;
            position: relative;
        }

        .hp-bar-fill {
            background-color: #4ade80; 
            height: 100%;
            width: 100%;
            transition: width 0.3s ease;
        }

        .hp-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 11px;
            color: #fff;
            margin-left: 8px;
        }

        .stage-title {
            font-size: 14px;
            font-weight: bold;
            color: #4ade80;
        }

        .monster-box {
            background-color: #09090f;
            border: 2px solid #333;
            border-radius: 12px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            margin-bottom: 20px;
            position: relative;
            transition: all 0.3s ease;
        }

        .monster-die {
            transform: scale(0) rotate(360deg);
            opacity: 0;
        }

        .story-box {
            background-color: #1f1f2e;
            border-left: 5px solid #4ade80;
            padding: 15px 20px;
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 20px;
            border-radius: 0 12px 12px 0;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background-color: #252538;
            color: #ffffff;
            border: 2px solid #4a5568;
            border-radius: 10px;
            padding: 14px 20px;
            font-size: 16px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #4ade80;
            color: #000000;
            border-color: #4ade80;
            transform: translateY(-2px);
        }

        .input-container {
            display: none;
            flex-direction: column;
            gap: 12px;
        }
        .text-input {
            background-color: #09090f;
            border: 2px solid #4a5568;
            border-radius: 10px;
            padding: 14px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .text-input:focus {
            border-color: #4ade80;
        }
        .submit-btn {
            background-color: #4ade80;
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .foot-layer {
            display: none;
            text-align: center;
            margin-bottom: 20px;
        }
        .foot-img {
            max-width: 100%;
            max-height: 200px;
            border: 3px solid #fff;
            border-radius: 8px;
        }

        .btn-final {
            background-color: #facc15;
            color: #000;
            border: none;
            text-align: center;
        }
        .btn-final:hover {
            background-color: #eab308;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="status-bar">
            <div class="hp-container">
                <span style="font-size:12px;">勇者 HP</span>
                <div class="hp-bar-bg">
                    <div id="hp-fill" class="hp-bar-fill"></div>
                </div>
                <span id="hp-text" class="hp-text">100/100</span>
            </div>
            <div class="stage-title">關卡: <span id="stage-num">1</span>/25</div>
        </div>

        <div id="monster-element" class="monster-box">👾</div>

        <div id="foot-box" class="foot-layer">
            <img class="foot-img" src="https://images.unsplash.com/photo-1549488344-1f9b8d2bd1f3?w=500" alt="腳的照片">
        </div>

        <div id="question-text" class="story-box">載入中...</div>

        <div id="options-box" class="options-container"></div>

        <div id="input-box" class="input-container">
            <input type="text" id="answer-input" class="text-input" placeholder="請輸入答案...">
            <button onclick="checkInputAnswer()" class="submit-btn">擊殺怪獸</button>
        </div>
    </div>

    <script>
        const gameData = [
            { type: "select", question: "我最常生氣的原因是？", options: [{text:"A 你太白目", isCorrect:true, feedback:"哼算你聰明！"}, {text:"B 太餓", isCorrect:false, feedback:"才不是哩！"}, {text:"C 單純脾氣不好", isCorrect:false, feedback:"妳才脾氣不好！"}], monster: "😈" },
            { type: "select", question: "我們第一次牽手是在", options: [{text:"A 電影院", isCorrect:false, feedback:"記錯打屁股！"}, {text:"B 公園", isCorrect:false, feedback:"不對喔！"}, {text:"C 學校斜坡", isCorrect:true, feedback:"算你還記得❤️"}], monster: "👻" },
            { type: "select", question: "我最常說的暱稱是？", options: [{text:"A 寶貝", isCorrect:false, feedback:"不對～"}, {text:"B 豬頭", isCorrect:false, feedback:"不對喔～"}, {text:"C 徐張帝", isCorrect:true, feedback:"沒錯就是這個！"}], monster: "👹" },
            { type: "select", question: "我最喜歡的食物是？", options: [{text:"A 巧克力", isCorrect:false, feedback:"答錯啦！"}, {text:"B 壽司", isCorrect:true, feedback:"答對了！最愛壽司了！"}, {text:"C 想吃什麼就吃什麼乾妳屁事", isCorrect:false, feedback:"好膽再說一次！"}], monster: "🎃" },
            { type: "select", question: "我最常熬夜做什麼？", options: [{text:"A 看漫畫", isCorrect:false, feedback:"錯！"}, {text:"B 講電話", isCorrect:false, feedback:"錯～"}, {text:"C 滑手機", isCorrect:true, feedback:"對啦，標準手機癮君子！"}], monster: "👽" },
            { type: "select", question: "我最喜歡的顏色是？", options: [{text:"A 藍色", isCorrect:false, feedback: "答錯囉！"}, {text:"B 彩色", isCorrect:false, feedback: "屁啦！"}, {text:"C 綠色", isCorrect:true, feedback: "沒錯！最喜歡綠色了！"}], monster: "👾" },
            { type: "select", question: "第一次打耳洞是什麼時候", options: [{text:"A 國中一年級", isCorrect:false}, {text:"B 國中二年級", isCorrect:false}, {text:"C 國中三年級", isCorrect:false}], allowAny: true, specialFeedback: "全錯 因為我忘記了 🤷‍♀️", monster: "🦇" },
            { type: "select", question: "我最想成為什麼", options: [{text:"A 超級大便人", isCorrect:false}, {text:"B 農夫", isCorrect:false}, {text:"C 有錢人的小三", isCorrect:false}], allowAny: true, specialFeedback: "全錯 是我都想當 🤑", monster: "🕷️" },
            { type: "select", question: "如果世界末日我會做什麼", options: [{text:"A 跟你見面", isCorrect:false}, {text:"B 等死", isCorrect:false}, {text:"C 揍爆全世界", isCorrect:false}], allowAny: true, specialFeedback: "全錯 我會在家裡滑手機 📱", monster: "🦂" },
            { type: "select", question: "我近期最喜歡的一部漫畫", options: [{text:"A 衝鋒衣", isCorrect:false, feedback:"猜錯了！"}, {text:"B 初戀標籤", isCorrect:true, feedback:"沒錯！就是初戀標籤❤️"}, {text:"C 枯萎的花淚", isCorrect:false, feedback:"不對喔！"}], monster: "🐍" },
            { type: "select", question: "我最喜歡的休閒活動", options: [{text:"A 滑手機", isCorrect:true, feedback:"沒錯，我就是低頭族！"}, {text:"B 睡覺", isCorrect:false, feedback:"雖然想睡但還是選滑手機！"}, {text:"C 当农夫", isCorrect:false, feedback:"錯！"}], monster: "🦎" },
            { type: "input", question: "我媽什麼星座（簡答題）", answers: ["摩羯座", "摩羯"], feedback: "答對了！過關！", monster: "🐺" },
            { type: "select", question: "我上課想睡覺時我會怎麼做", options: [{text:"A 硬撐", isCorrect:false}, {text:"B 喝水，讓自己清醒", isCorrect:false}, {text:"C 滑手機", isCorrect:false}], allowAny: true, specialFeedback: "全錯 我會直接睡覺 💤", monster: "🐻" },
            { type: "select", question: "如果我和你媽掉進水裡妳救誰", options: [{text:"救媽媽", isCorrect:false, feedback:"你不愛我了 😭"}, {text:"救我", isCorrect:false, feedback:"不肖子 🤨"}], specialTrap: true, monster: "🌊" },
            { type: "select", question: "我走路都先邁左腳還是右腳", options: [{text:"A 左", isCorrect:false}, {text:"B 右", isCorrect:false}], allowAny: true, specialFeedback: "都錯 我會原地起飛 🛸", monster: "🦅" },
            { type: "select", question: "你是足控嗎", options: [{text:"是", isCorrect:true, feedback:"好啦給你看照片！ 👣"}, {text:"不是", isCorrect:true, feedback:"不管是或不是，都給你看照片 👣"}], showFoot: true, monster: "👣" },
            { type: "select", question: "如果我看到老奶奶要過馬路我會做什麼", options: [{text:"A 扶他過馬路", isCorrect:false}, {text:"B 揍他一拳", isCorrect:false}, {text:"C 冷眼旁觀", isCorrect:false}], allowAny: true, specialFeedback: "都錯，我就是老奶奶 👵", monster: "🦁" },
            { type: "select", question: "我們第一次約會在哪裡", options: [{text:"A 電影院", isCorrect:true, feedback:"太棒了！"}, {text:"B 妳家", isCorrect:false, feedback:"不對喔！"}, {text:"C 公園", isCorrect:false, feedback:"答錯了！"}], monster: "🐯" },
            { type: "select", question: "我是一個怎麼樣的人", options: [{text:"A 性感", isCorrect:false}, {text:"B 可愛", isCorrect:false}, {text:"C 67", isCorrect:false}], allowAny: true, specialFeedback: "都錯 我是一個87的人 🤪", monster: "🐷" },
            { type: "input", question: "請說出跟我玩在一起的四個朋友的名字（簡答題，名字中間不用空格）", answers: ["王盈穎陳琳綾劉千瑜吳柏儒"], feedback: "哇！你竟然全都背得出來！", monster: "👑" },
            { type: "input", question: "我哥什麼星座（簡答題）", answers: ["雙魚座", "雙魚"], feedback: "沒錯，算你有心！", monster: "🐵" },
            { type: "input", question: "我爸什麼時候生日（簡答題，格式如5/5）", answers: ["5/5", "5月5日"], feedback: "完全正確！", monster: "🦊" },
            { type: "select", question: "我寫作業的時候會做什麼", options: [{text:"A 聽音樂", isCorrect:false}, {text:"B 唱歌", isCorrect:false}, {text:"C 滑手機", isCorrect:false}], allowAny: true, specialFeedback: "都錯，我不想寫作業 📝", monster: "🐸" },
            { type: "select", question: "我最想做的一件事", options: [{text:"A 揍你一拳", isCorrect:false, feedback:"錯！"}, {text:"B 重新成為有錢人", isCorrect:false, feedback:"錯！"}, {text:"C 當香蕉大王", isCorrect:true, feedback:"沒錯，我要當香蕉大王！🍌"}], monster: "🐵" },
            { type: "select", question: "如果荒野亂鬥的排位開始了，但是我媽叫我，我會做什麼", options: [{text:"A 立刻過去找我媽", isCorrect:false}, {text:"B 繼續打", isCorrect:false}, {text:"C 站起來跳舞", isCorrect:false}], allowAny: true, specialFeedback: "都錯 我會直接變成愛德加 ⚔️", monster: "🔮" }
        ];

        let currentStage = 0;
        let playerHP = 100;
        let rightStreak = 0; 

        const hpFill = document.getElementById('hp-fill');
        const hpText = document.getElementById('hp-text');
        const stageNum = document.getElementById('stage-num');
        const questionText = document.getElementById('question-text');
        const optionsBox = document.getElementById('options-box');
        const inputBox = document.getElementById('input-box');
        const answerInput = document.getElementById('answer-input');
        const monsterElement = document.getElementById('monster-element');
        const footBox = document.getElementById('foot-box');

        function loadStage() {
            if (currentStage >= gameData.length) {
                showEnding();
                return;
            }

            const data = gameData[currentStage];
            stageNum.innerText = currentStage + 1;
            questionText.innerText = data.question;
            
            footBox.style.display = "none";
            monsterElement.style.display = "flex";

            if (rightStreak >= 3) {
                monsterElement.innerText = "🐉【大魔王 BOSS】";
                monsterElement.style.color = "#ff4d4d";
            } else {
                monsterElement.innerText = data.monster;
                monsterElement.style.color = "#fff";
            }

            if (data.type === "select") {
                optionsBox.style.display = "flex";
                inputBox.style.display = "none";
                optionsBox.innerHTML = '';

                data.options.forEach(opt => {
                    const button = document.createElement('button');
                    button.className = 'btn';
                    button.innerText = opt.text;
                    button.onclick = () => handleSelectChoice(opt, data);
                    optionsBox.appendChild(button);
                });
            } else if (data.type === "input") {
                optionsBox.style.display = "none";
                inputBox.style.display = "flex";
                answerInput.value = '';
            }
        }

        function handleSelectChoice(option, stageDetails) {
            if (stageDetails.specialTrap) {
                alert(option.feedback);
                if (!stageDetails.clickCount) stageDetails.clickCount = 1;
                else stageDetails.clickCount++;
                
                if (stageDetails.clickCount >= 2) {
                    currentStage++;
                    loadStage();
                }
                return;
            }

            if (stageDetails.allowAny) {
                alert(stageDetails.specialFeedback);
                rightStreak++;
                triggerMonsterDie();
                return;
            }

            if (stageDetails.showFoot) {
                alert(option.feedback);
                monsterElement.style.display = "none";
                footBox.style.display = "block";
                optionsBox.innerHTML = '';
                
                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn btn-final';
                nextBtn.innerText = '👀 看夠了，消滅怪物前進下關！';
                nextBtn.onclick = () => {
                    rightStreak++;
                    currentStage++;
                    loadStage();
                };
                optionsBox.appendChild(nextBtn);
                return;
            }

            if (option.isCorrect) {
                alert(option.feedback);
                rightStreak++;
                triggerMonsterDie();
            } else {
                alert(option.feedback ? option.feedback + " 答錯扣血！" : "答錯囉！扣血並進入下一關！");
                handleWrongAnswer();
            }
        }

        function checkInputAnswer() {
            const data = gameData[currentStage];
            const userAns = answerInput.value.trim();
            const isRight = data.answers.some(ans => userAns.includes(ans) || ans.includes(userAns) && userAns !== "");

            if (isRight) {
                alert(data.feedback);
                rightStreak++;
                triggerMonsterDie();
            } else {
                alert("答錯囉！扣血並強制進入下一關！");
                handleWrongAnswer();
            }
        }

        function triggerMonsterDie() {
            monsterElement.classList.add('monster-die');
            setTimeout(() => {
                monsterElement.classList.remove('monster-die');
                currentStage++;
                loadStage();
            }, 400);
        }

        function handleWrongAnswer() {
            rightStreak = 0; 
            playerHP -= 20;
            
            hpText.innerText = playerHP + "/100";
            
            let visualPercent = playerHP < 0 ? 0 : playerHP;
            hpFill.style.width = visualPercent + '%';
            
            if (playerHP <= 30) {
                hpFill.style.backgroundColor = '#ef4444'; 
            }

            document.body.classList.add('wrong-flash');
            setTimeout(() => document.body.classList.remove('wrong-flash'), 150);

            currentStage++;
            setTimeout(() => {
                loadStage();
            }, 200);
        }

        function showEnding() {
            monsterElement.innerText = "👑🏰";
            questionText.innerHTML = "🎉 恭喜你抵達地下城堡的最深處！<br><br>一路上斬妖除魔，不管你的 HP 是滿血還是早就變成負數，你都憑著意志力撐到了最後！<br><br>點擊下方按鈕，打開最終聖物播放主題曲吧！";
            optionsBox.style.display = "flex";
            inputBox.style.display = "none";
            optionsBox.innerHTML = '';
            footBox.style.display = "none";
            
            const finalBtn = document.createElement('button');
            finalBtn.className = 'btn btn-final';
            finalBtn.innerText = '🎁 打開最終寶箱並播放《Kaying 改硬》';
            finalBtn.onclick = () => {
                window.location.href = "https://www.youtube.com/watch?v=0wAsfSndvsc";
            };
            optionsBox.appendChild(finalBtn);
        }

        loadStage();
    </script>
</body>
</html>
